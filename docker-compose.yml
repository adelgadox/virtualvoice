services:
  db:
    image: postgres:16-alpine
    container_name: virtualvoice_db
    environment:
      POSTGRES_USER: virtualvoice
      POSTGRES_PASSWORD: virtualvoice
      POSTGRES_DB: virtualvoice
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virtualvoice"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: virtualvoice_backend
    env_file: ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    container_name: virtualvoice_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    depends_on:
      - backend

volumes:
  postgres_data:
